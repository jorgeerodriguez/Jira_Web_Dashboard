# darkstar (FastAPI v2) CI — builds its own image independently of pe-reports (Streamlit).
# Included from the root .gitlab-ci.yml; the dev build + promote run ONLY when darkstar/ changes,
# so a pe-reports change never rebuilds darkstar (and vice-versa). Dockerfile: darkstar/Dockerfile.
.darkstar-variables:
  variables:
    IMAGE_NAME: darkstar
    REGISTRY_ENDPOINT: 910555647794.dkr.ecr.us-east-1.amazonaws.com
    PROJECT_SUB_DIR: darkstar

publish:darkstar:
  stage: publish
  extends:
    - .publish
    - .darkstar-variables
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
      changes:
        - darkstar/**/*

publish-semver:darkstar:
  stage: publish-semver
  extends:
    - .create_semver
    - .darkstar-variables

promote-dev:darkstar:
  stage: promote-dev
  needs: ["publish:darkstar"]
  extends:
    - .dev_deploy
    - .darkstar-variables
  rules:
    - if: $CI_COMMIT_BRANCH == 'main' && $CI_COMMIT_TAG == null
      changes:
        - darkstar/**/*
      when: manual

release:darkstar:
  stage: release
  needs: ["publish-semver:darkstar"]
  extends:
    - .prod_deploy
    - .darkstar-variables

.app_promotion_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == 'main' && $CI_COMMIT_TAG == null
      when: manual

default:
  tags:
    - group
    - devops

.custom-variables:
  variables:
    IMAGE_NAME: pe-reports
    REGISTRY_ENDPOINT: 910555647794.dkr.ecr.us-east-1.amazonaws.com

test:pe-reports:
  stage: test
  image: python:3.12-slim
  script:
    - pip install --no-cache-dir -r requirements-dev.txt
    - pytest tests/ -v
  rules:
    - if: $CI_COMMIT_TAG == null

publish:pe-reports:
  stage: publish
  extends:
    - .publish
    - .custom-variables
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'

publish-semver:pe-reports:
  stage: publish-semver
  extends:
    - .create_semver
    - .custom-variables

## DEV
promote-dev:pe-reports:
  stage: promote-dev
  needs: ["publish:pe-reports"]
  extends:
    - .dev_deploy
    - .custom-variables
  rules:
    - !reference [.app_promotion_rules, rules]

### PROD
release:pe-reports:
  stage: release
  needs: ["publish-semver:pe-reports"]
  extends:
    - .prod_deploy
    - .custom-variables
